// Managed by server-setup — do not edit by hand (server setup overwrites it).
// Automatic security updates with an unattended reboot at 04:00 (CDC §10.5).
// The Update-Package-Lists / Unattended-Upgrade periodic toggles live in the
// generated 20auto-upgrades file alongside this drop-in.

Unattended-Upgrade::Automatic-Reboot "true";
Unattended-Upgrade::Automatic-Reboot-Time "04:00";

Unattended-Upgrade::Allowed-Origins {
    "${distro_id}:${distro_codename}-security";
    "${distro_id}ESMApps:${distro_codename}-apps-security";
    "${distro_id}ESM:${distro_codename}-infra-security";
};
