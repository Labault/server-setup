# Managed by server-setup — do not edit by hand (server setup overwrites it).
# SSH hardening drop-in (CDC §10.2). Deposited under sshd_config.d, NEVER by
# editing sshd_config directly, and applied through the anti-lockout cutover
# (§9.4): sshd -t on the merged config, loopback key self-test, dead-man's
# switch, then `reload` (never `restart`).
PermitRootLogin no
PasswordAuthentication no
PubkeyAuthentication yes
KbdInteractiveAuthentication no
