# Black-box validation harness — separate from the bootstrap-deposited workflows
# (ci.yml, security.yml, tests.yml), which it does not touch. It converges a
# disposable systemd container, never the runner's host (D15).
name: validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  container-harness:
    name: container harness (minimal → docker → web)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Run the validation harness
        run: ./run-all.sh
        working-directory: validation
