# Managed by bootstrap. Dead-link checker config for lychee.
max_redirects = 5
max_retries = 2
retry_wait_time = 2
timeout = 20

# Treat these as success even when servers are unfriendly to bots.
accept = [200, 201, 202, 203, 204, 206, 429]

exclude = [
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  "^https?://0\\.0\\.0\\.0",
  # This repo is private: its own badge/self URLs can't be checked anonymously
  # (they 404 without a token). The public sibling repos stay checked.
  "^https?://github\\.com/Labault/server-setup",
]

exclude_path = [
  "node_modules",
  "vendor",
]
